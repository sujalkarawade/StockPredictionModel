<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Prediction Result</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles_result.css') }}">
    </head>
    <body>
        <main class="page">
            <section class="app-card result-card">
                <div class="result-topbar">
                    <div>
                        <p class="kicker">Prediction Result</p>
                        <h1>Predicted graph for {{ uploaded_name }}</h1>
                    </div>
                    <a class="secondary-button" href="{{ url_for('index') }}">Upload Another File</a>
                </div>

                {% if summary %}
                <section class="result-body">
                    <aside class="summary-column">
                        <section class="summary-grid summary-vertical">
                            <article class="summary-card">
                                <span>Rows</span>
                                <strong>{{ summary.points }}</strong>
                            </article>
                            <article class="summary-card">
                                <span>Date range</span>
                                <strong>{{ summary.start_date }} to {{ summary.end_date }}</strong>
                            </article>
                            <article class="summary-card">
                                <span>Latest close</span>
                                <strong>{{ summary.latest_close }}</strong>
                            </article>
                        </section>
                    </aside>

                    <section class="chart-column">
                        <div class="chart-box">
                            <img src="{{ graph }}" alt="Prediction graph for {{ uploaded_name }}">
                        </div>
                    </section>
                </section>
                {% else %}
                <section class="chart-section">
                    <div class="chart-box">
                        <img src="{{ graph }}" alt="Prediction graph for {{ uploaded_name }}">
                    </div>
                </section>
                {% endif %}
            </section>
        </main>
    </body>
</html>
