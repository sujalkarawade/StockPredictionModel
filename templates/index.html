<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Stock Price Prediction</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles_index.css') }}">
    </head>
    <body>
        <main class="page">
            <div class="center-card">
            <section class="app-card">
                <header class="app-header">
                    <p class="kicker">Stock Price Prediction</p>
                    <h1>Upload your stock data file</h1>
                    <p class="lead">
                        Use a CSV or Excel file to generate a simple prediction chart.
                    </p>
                </header>

                <form class="upload-form" method="POST" enctype="multipart/form-data">
                    <div class="inputs-grid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; width: 100%;">
                        <div class="field-group">
                            <label class="field-label" for="file">Data file</label>
                            <label class="file-picker" for="file">
                                <input id="file" class="file-input" type="file" name="file" accept=".csv,.xls,.xlsx" required>
                                <span class="file-button">Choose file</span>
                                <span class="file-name" id="file-name">{{ uploaded_name or "No file selected" }}</span>
                                
                            </label>
                            <p class="field-note">Supported formats: CSV, XLS, XLSX</p>
                        </div>

                        <div class="field-group">
                            <label class="field-label">Machine Learning Model</label>
                            <!-- Hidden input carries the value on form submit -->
                            <input type="hidden" id="model_type" name="model_type" value="Linear Regression">
                            <div class="custom-select" id="customSelect">
                                <button type="button" class="custom-select__trigger" aria-haspopup="listbox" aria-expanded="false">
                                    <span class="custom-select__value">Linear Regression</span>
                                    <svg class="custom-select__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                                </button>
                                <ul class="custom-select__dropdown" role="listbox">
                                    <li class="custom-select__option selected" role="option" data-value="Linear Regression">
                                        <span class="option-icon">📈</span> Linear Regression
                                    </li>
                                    <li class="custom-select__option" role="option" data-value="Decision Tree">
                                        <span class="option-icon">🌿</span> Decision Tree Regressor
                                    </li>
                                    <li class="custom-select__option" role="option" data-value="Random Forest">
                                        <span class="option-icon">🌲</span> Random Forest Regressor
                                    </li>
                                    <li class="custom-select__option" role="option" data-value="XGBoost">
                                        <span class="option-icon">⚡</span> XGBoost Regressor
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div style="width: 100%; display: flex; justify-content: center;">
                        <button id="submit-button" class="primary-button" type="submit">Generate Prediction</button>
                    </div>
                </form>
            </section>
                </div>
        </main>

        <script>
            // File picker
            const fileInput = document.getElementById("file");
            const fileName = document.getElementById("file-name");
            const submitButton = document.getElementById("submit-button");
            const uploadForm = document.querySelector(".upload-form");

            if (fileInput && fileName) {
                fileInput.addEventListener("change", () => {
                    fileName.textContent = fileInput.files.length ? fileInput.files[0].name : "No file selected";
                });
            }

            if (uploadForm && submitButton) {
                uploadForm.addEventListener("submit", () => {
                    submitButton.disabled = true;
                    submitButton.textContent = "Generating...";
                });
            }

            // Custom select
            const cs = document.getElementById("customSelect");
            const trigger = cs.querySelector(".custom-select__trigger");
            const dropdown = cs.querySelector(".custom-select__dropdown");
            const valueLabel = cs.querySelector(".custom-select__value");
            const hiddenInput = document.getElementById("model_type");
            const options = cs.querySelectorAll(".custom-select__option");

            trigger.addEventListener("click", () => {
                const open = cs.classList.toggle("open");
                trigger.setAttribute("aria-expanded", open);
            });

            options.forEach(opt => {
                opt.addEventListener("click", () => {
                    options.forEach(o => o.classList.remove("selected"));
                    opt.classList.add("selected");
                    valueLabel.textContent = opt.textContent.trim();
                    hiddenInput.value = opt.dataset.value;
                    cs.classList.remove("open");
                    trigger.setAttribute("aria-expanded", "false");
                });
            });

            // Close on outside click
            document.addEventListener("click", e => {
                if (!cs.contains(e.target)) {
                    cs.classList.remove("open");
                    trigger.setAttribute("aria-expanded", "false");
                }
            });
        </script>
    </body>
</html>
